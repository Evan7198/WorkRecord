<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>WorkRecord App Logo</title>
  <desc>Minimal rounded-square app icon combining a progress timer ring, an abstract W-shaped work timeline, and a completed reminder dot.</desc>

  <!-- Transparent canvas; the rounded square forms the app-icon body. -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="#020617"/>

  <!-- Open timer/progress ring. -->
  <path d="M 786.38 611.87
           A 292 292 0 1 1 344.50 272.82"
        fill="none" stroke="#6366F1" stroke-width="76"
        stroke-linecap="round"/>

  <!-- Cyan completion segment at the end of the progress ring. -->
  <path d="M 344.50 272.82
           A 292 292 0 0 1 512.00 220.00"
        fill="none" stroke="#06B6D4" stroke-width="76"
        stroke-linecap="round"/>

  <!-- Abstract W-shaped work timeline / focus rhythm. -->
  <path d="M 300 458
           L 394 642
           L 512 410
           L 630 642
           L 724 458"
        fill="none" stroke="#E5E7EB" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gentle reminder/completion indicator. -->
  <circle cx="748" cy="286" r="82" fill="#22C55E" stroke="#020617" stroke-width="22"/>
  <path d="M 711 287 L 738 314 L 788 258"
        fill="none" stroke="#020617" stroke-width="27"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
